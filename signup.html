      :root{
    --accent:#0b66ff;
    --muted:#6c82a3;
  }

  .field {
    position: relative;
    margin: 18px 0;
    padding-left: 20px;
    width: 500px;
  }

  .field input {
    width: 100%;
    padding: 14px 12px;
    padding-top: 18px; 
    border: 1px solid #e6e9ef;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    background: #fff;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 6px 18px rgba(11,102,255,0.08);
  }

  .field .legend {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
    transition: transform .15s ease, font-size .15s ease, top .15s ease, color .15s;
    background-color: #ffffff;
    padding: 0 6px;
  }


  .field input:focus + .legend,
  .field input:not(:placeholder-shown) + .legend {
    top: -8px;
    transform: none;
    font-size: 12px;
    color: var(--accent);
  }

  
  .field.filled .legend {
    top: -8px;
    transform: none;
    font-size: 12px;
    color: var(--accent);
  }
  .indepent{
   
    margin-top: 30px;

  }

}
.background img{

}

     <script>
  
  document.querySelectorAll('.field input').forEach(input=>{
    const parent = input.parentElement;
    function toggle(){
      if(input.value.trim() !== '') parent.classList.add('filled');
      else parent.classList.remove('filled');
    }
    input.addEventListener('input', toggle);
    // initialize
    toggle();
  });
</script>
