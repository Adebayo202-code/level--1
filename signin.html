     :root{
    --accent:#0b66ff;
    --muted:#6c82a3;
  }

  .field {
    position: relative;
    margin: 18px 0;
    padding-left: 20px;
    width: 450px;
  }

  .field input {
    width: 100%;
    padding: 14px 12px;
    padding-top: 18px; 
    border: 1px solid #e6e9ef;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    background: #fff;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 6px 18px rgba(11,102,255,0.08);
  }

  .field .legend {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
    transition: transform .15s ease, font-size .15s ease, top .15s ease, color .15s;
    background-color: #ffffff;
    padding: 0 6px;
  }


  .field input:focus + .legend,
  .field input:not(:placeholder-shown) + .legend {
    top: -8px;
    transform: none;
    font-size: 12px;
    color: var(--accent);
  }

  
  .field.filled .legend {
    top: -8px;
    transform: none;
    font-size: 12px;
    color: var(--accent);
  }
  .field-set{
     position: relative;
    margin: 18px 0;
    padding-left: 20px;
    width: 450px;
  }
  .field-set input{
    width: 100%;
    padding: 14px 12px;
    padding-top: 18px; /* leave room for the floating label */
    border: 1px solid #e6e9ef;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    background: #fff;
  }
  .field-set input:focus{
        border-color: var(--accent);
    box-shadow: 0 6px 18px rgba(11,102,255,0.08);
  }
  .field-set .legend-page{
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    pointer-events: none;
    transition: transform .15s ease, font-size .15s ease, top .15s ease, color .15s;
    background-color: #ffffff;
    padding: 0 6px;
  }
  .field-set input:focus + .legend-page,
  .field-set input:not(:placeholder-shown) + .legend-page {
    top: -8px;
    transform: none;
    font-size: 12px;
    color: var(--accent);
  }
  .field-set.filled .legend-page {
    top: -8px;
    transform: none;
    font-size: 12px;
    color: var(--accent);
  }

/* responsiveness design */

/* Small screens (Mobile) - 320px to 480px */
@media (max-width: 480px) { 
    .img-fluid {
        margin-top: 50px;
        margin-left: 20px;
    }
    
    .card-body {
        flex-direction: column;
        margin-top: 40px !important;
        margin-left: 20px !important;
        gap: 20px !important;
    }
    
    .left-page h3 {
        font-size: 28px;
    }
    
    .left-page h5 {
        font-size: 16px;
    }
    
    .left-page span {
        font-size: 14px;
    }
    
    .font-tag {
        padding: 20px 15px 40px 15px;
        max-width: 100%;
        width: 90vw;
    }
    
    .button {
        flex-direction: column;
        margin: 20px 0;
        gap: 10px;
    }
    
    .google, .apple {
        width: 100%;
        padding: 10px 5px;
    }
    
    .google img, .apple img {
        width: 16px;
        height: auto;
    }
    
    .google span, .apple span {
        font-size: 14px;
    }
    
    .field, .field-set {
        width: 100%;
        padding-left: 15px;
    }
    
    .text-divider {
        padding: 0 15px;
    }
    
    .forget a {
        margin-left: 15px;
        font-size: 14px;
    }
    
    .btn-check button {
        width: 90%;
        margin-left: 15px;
        margin-right: 15px;
        padding: 10px;
        font-size: 14px;
    }
    
    .progress {
        top: auto;
        margin-top: 20px;
        margin-left: 15px;
        font-size: 12px;
    }
    
    .progress a {
        font-size: 12px;
    }
    
    .header {
        position: relative;
        top: auto;
        right: auto;
        margin-top: 10px;
        margin-left: 15px;
        font-size: 12px;
    }
}

/* Medium screens (Tablet) - 481px to 768px */
@media (min-width: 481px) and (max-width: 768px) {
    .img-fluid {
        margin-top: 80px;
        margin-left: 30px;
    }
    
    .card-body {
        margin-left: 30px;
        gap: 15em;
    }
    
    .left-page h3 {

    }
    
    .left-page h5 {

    }
    
    .font-tag {

    }
    
    .field, .field-set {
        width: 100%;
        max-width: 350px;
    }
    
    .button {
        margin: 20px 0;
        gap: 15px;
    }
}

/* Large screens (Desktop) - 769px and above */
@media (min-width: 769px) {
    .img-fluid {
        margin-top: 100px;
        margin-left: 50px;
    }
    
    .card-body {
        margin-top: 120px;
        margin-left: 60px;

    }
    
    .left-page h5 {
        font-size: 25px;
    }
    
    .font-tag {
        max-width: 33em;
        padding: 20px;
    }
    
    .field, .field-set {
        width: 450px;
    }
    
    .btn-check button {
        width: 85%;
    }
}

       </div> -->
            
    <script>
  
  document.querySelectorAll('.field input').forEach(input=>{
    const parent = input.parentElement;
    function toggle(){
      if(input.value.trim() !== '') parent.classList.add('filled');
      else parent.classList.remove('filled');
    }
    input.addEventListener('input', toggle);
    // initialize
    toggle();
  });
</script>
